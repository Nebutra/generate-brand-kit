name: validate

on:
  push:
  pull_request:

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv run --with ruff ruff check scripts subskills/extend-wordmark-font/scripts
      - run: python3 scripts/check_skill.py
      - run: uv run --with fonttools --with brotli python subskills/extend-wordmark-font/scripts/validate_alpha_font.py --help
