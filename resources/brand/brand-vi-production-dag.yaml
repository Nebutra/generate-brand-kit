# Compiled by compile_brand_image_dag.py. Do not hand-edit sibling prompts.
tasks:
  - id: "symbol-production-master"
    name: "symbol-production-master"
    ratio: "1:1"
    refs:
      - "approved/core-mark.png"
    prompt: |-
      TASK
      Create the production-clean raster master for the approved generate-brand-vi symbol.

      STRATEGY
      Preserve the approved identity; this is cleanup, not redesign.

      INVARIANT LOCK
      modular construction governed by one repeatable operation; one recognizable silhouette and one distinctive interruption; flat geometry remains legible in black and white at 32 pixels; preserve exact silhouette, counterforms, proportion, posture, and orientation

      REFERENCE AUTHORITY
      Reference 1 is the approved canonical symbol and controls all geometry.

      ONE VARIATION MECHANISM
      Remove generation debris and normalize only edge clarity.

      OUTPUT AND SCENE
      One centered flat symbol on transparent or pure white 1:1 as specified; no wordmark or surrounding layout.

      NEGATIVE CONSTRAINTS
      no Microsoft four-pane flag reading; no droplet, crystal, sparkle, magic wand, or generic AI symbol; no decorative material used to rescue weak geometry; no logo board or contact sheet; no secondary candidate; no caption or generated explanatory text; no watermark; no mockup unless the task explicitly requests one; no decorative glow, glass, bevel, extrusion, or unrelated texture; no literal category pictogram or familiar trademark imitation
