# Compiled by compile_brand_image_dag.py. Do not hand-edit sibling prompts.
tasks:
  - id: "symbol-assembly-gap"
    name: "symbol-assembly-gap"
    ratio: "1:1"
    prompt: |-
      TASK
      Create exactly one isolated black-and-white symbol candidate for generate-brand-vi.

      STRATEGY
      Brand philosophy: A brand engineering skill assembles approved identity parts into one consistent, product-consumable system.. Business tension: independent brand assets versus one governed system.

      INVARIANT LOCK
      modular construction governed by one repeatable operation; one recognizable silhouette and one distinctive interruption; flat geometry remains legible in black and white at 32 pixels

      REFERENCE AUTHORITY
      No visual reference controls form at exploration stage; use only the approved strategy and operation.

      ONE VARIATION MECHANISM
      Use only one controlled assembly gap. Distinctive rule: different modular parts resolve into one silhouette while one join remains visibly in progress.

      OUTPUT AND SCENE
      One centered flat black symbol on pure white, square 1:1. No wordmark, letters, board, scene, or mockup.

      NEGATIVE CONSTRAINTS
      no Microsoft four-pane flag reading; no droplet, crystal, sparkle, magic wand, or generic AI symbol; no decorative material used to rescue weak geometry; no logo board or contact sheet; no secondary candidate; no caption or generated explanatory text; no watermark; no mockup unless the task explicitly requests one; no decorative glow, glass, bevel, extrusion, or unrelated texture; no literal category pictogram or familiar trademark imitation
